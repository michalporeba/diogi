name: Build

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group dev --frozen
      - name: Run Ruff check
        run: uv run ruff check .
      - name: Run Ruff format (check only)
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev --frozen
      - run: uv run --frozen pytest

  build:
    runs-on: ubuntu-latest
    needs: verify-version
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv build

  verify-version:
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Verify Version
        run: |
          PYPROJECT_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG_VERSION=${{ github.event.release.tag_name }}
            TAG_VERSION=${TAG_VERSION#v}
            echo "Release tag: $TAG_VERSION"
            if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Release tag ($TAG_VERSION) does not match pyproject.toml version ($PYPROJECT_VERSION)"
              exit 1
            fi
            echo "Version check passed for release."
          else
            # On regular pushes/PRs, just warn if the version is already tagged
            if git ls-remote --tags origin | grep -q "refs/tags/v$PYPROJECT_VERSION$"; then
              echo "::warning::Version $PYPROJECT_VERSION is already tagged. Remember to bump the version in pyproject.toml before your next release."
            else
              echo "Version $PYPROJECT_VERSION is new and ready for release (v$PYPROJECT_VERSION)."
            fi
          fi

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: read
      id-token: write  # Required for OIDC authentication
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
